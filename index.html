<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Motima · Dashboard Performance 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f8f6; --s1: #ffffff; --s2: #f0f5f3; --border: rgba(58,125,107,0.12);
  --g: #2E7D5E; --teal: #1a6b5c; --radius: 16px; --f: 'Plus+Jakarta+Sans', sans-serif;
}
body { background: var(--bg); color: #1a2e28; font-family: var(--f); margin: 0; display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
#sidebar { width: 260px; background: var(--s1); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.nav-section { padding: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--g); opacity: 0.6; }
.week-picker-container { padding: 0 15px 20px; }
.week-select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--s2); background: var(--bg); font-family: var(--f); font-weight: 700; color: var(--g); cursor: pointer; outline: none; }

/* Main Content */
#main { flex: 1; overflow-y: auto; padding: 40px; }
.page-header { margin-bottom: 30px; }
.page-title { font-size: 24px; font-weight: 800; color: var(--teal); margin: 0; }
.slide-tag { display: inline-block; padding: 4px 10px; background: var(--g); color: white; border-radius: 20px; font-size: 11px; font-weight: 700; margin-top: 8px; }

.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
.card { background: var(--s1); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; }
.kpi-label { font-size: 13px; font-weight: 600; color: #6d857d; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 800; color: var(--g); }

.screenshot-container { width: 100%; min-height: 400px; background: var(--s2); border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 2px dashed var(--border); margin-top: 15px; overflow: hidden; }
.screenshot-container img { width: 100%; height: auto; object-fit: contain; }

@media (max-width: 1000px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div id="sidebar">
    <div style="padding:30px 20px;"><strong style="color:var(--g); font-size:22px;">MOTIMA</strong></div>
    <div class="nav-section">Choix de la Semaine</div>
    <div class="week-picker-container">
        <select class="week-select" id="weekSelector" onchange="updateDashboard(this.value)">
            <option value="s12">Semaine 12 (Actuelle)</option>
            <option value="s10">Semaine 10</option>
            <option value="s9">Semaine 09 (Spécial)</option>
            <option value="s8">Semaine 08</option>
            <option value="s7">Semaine 07</option>
            <option value="s6">Semaine 06</option>
            <option value="s5">Semaine 05</option>
            <option value="s4">Semaine 04</option>
            <option value="s3">Semaine 03</option>
            <option value="s2">Semaine 02</option>
            <option value="s1">Semaine 01</option>
        </select>
    </div>
</div>

<div id="main">
    <div class="page-header">
        <h1 class="page-title" id="display-title">Insights Hebdomadaires - S12</h1>
        <div id="slide-info" class="slide-tag">Source : Slide 2</div>
    </div>

    <div class="kpi-grid">
        <div class="card"><div class="kpi-label">CA Global</div><div class="kpi-value" id="kpi-ca">-</div></div>
        <div class="card"><div class="kpi-label">ROAS</div><div class="kpi-value" id="kpi-roas">-</div></div>
        <div class="card"><div class="kpi-label">Conversions</div><div class="kpi-value" id="kpi-conv">-</div></div>
        <div class="card"><div class="kpi-label">CPA Moyen</div><div class="kpi-value" id="kpi-cpa">-</div></div>
    </div>

    <div class="card">
        <div class="kpi-label" id="img-title">Daily Pacing (Slide 2)</div>
        <div class="screenshot-container">
            <img id="main-img" src="" alt="Merci d'ajouter la capture d'écran dans votre dossier">
        </div>
    </div>
</div>

<script>
// Données extraites de vos documents PPTX
const dataBase = {
    "s12": { ca: "142 340 €", roas: "4.82", conv: "1 248", cpa: "8.54 €", slide: "Slide 2" },
    "s10": { ca: "3 163 €", roas: "5.90", conv: "51", cpa: "10.50 €", slide: "Slide 2" },
    "s9":  { ca: "4 335 €", roas: "8.07", conv: "66", cpa: "8.14 €", slide: "Slide 11" },
    "s8":  { ca: "3 015 €", roas: "7.61", conv: "44", cpa: "12.50 €", slide: "Slide 2" },
    "s7":  { ca: "4 251 €", roas: "6.60", conv: "63", cpa: "9.10 €", slide: "Slide 2" },
    "s6":  { ca: "4 472 €", roas: "21.02", conv: "46", cpa: "4.62 €", slide: "Slide 2" },
    "s5":  { ca: "2 890 €", roas: "5.95", conv: "38", cpa: "11.20 €", slide: "Slide 2" },
    "s4":  { ca: "4 844 €", roas: "7.12", conv: "62", cpa: "10.97 €", slide: "Slide 2" },
    "s3":  { ca: "3 240 €", roas: "6.10", conv: "58", cpa: "14.20 €", slide: "Slide 2" },
    "s2":  { ca: "2 950 €", roas: "8.89", conv: "42", cpa: "9.80 €", slide: "Slide 2" },
    "s1":  { ca: "2 822 €", roas: "4.28", conv: "40", cpa: "16.50 €", slide: "Slide 2" }
};

function updateDashboard(weekId) {
    const d = dataBase[weekId];
    document.getElementById('display-title').textContent = "Insights Hebdomadaires - " + weekId.toUpperCase();
    document.getElementById('kpi-ca').textContent = d.ca;
    document.getElementById('kpi-roas').textContent = d.roas;
    document.getElementById('kpi-conv').textContent = d.conv;
    document.getElementById('kpi-cpa').textContent = d.cpa;
    
    // Gestion spécifique du texte pour S9
    const infoText = (weekId === 's9') ? "Visualisation : Slide 11 | Données : Slide 12" : "Source : " + d.slide;
    document.getElementById('slide-info').textContent = infoText;
    document.getElementById('img-title').textContent = "Daily Pacing (" + d.slide + ")";
    
    // Chemin de l'image (doit correspondre au nom de vos fichiers images)
    document.getElementById('main-img').src = "capture_" + weekId + ".png";
}

// Lancement par défaut
updateDashboard('s12');
</script>
</body>
</html>
